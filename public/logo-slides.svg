<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle for better visibility on slides -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#slideGradient)" stroke-width="2" opacity="0.1"/>
  
  <!-- Head outline - larger and more detailed -->
  <path d="M100 25C115 25 130 35 140 50C150 65 148 85 140 100C135 110 130 115 100 115C70 115 65 110 60 100C52 85 50 65 60 50C70 35 85 25 100 25Z" 
        stroke="url(#slideGradient)" 
        stroke-width="4" 
        fill="none"
        filter="url(#glow)"/>
  
  <!-- Enhanced neural network circuit -->
  <!-- Left nodes - larger -->
  <circle cx="60" cy="70" r="4" fill="url(#slideGradient)" filter="url(#glow)"/>
  <circle cx="60" cy="130" r="4" fill="url(#slideGradient)" filter="url(#glow)"/>
  
  <!-- Central hub - more prominent -->
  <rect x="88" y="88" width="24" height="24" rx="6" fill="url(#slideGradient)" filter="url(#glow)"/>
  
  <!-- Right nodes - larger -->
  <circle cx="140" cy="70" r="4" fill="url(#slideGradient)" filter="url(#glow)"/>
  <circle cx="140" cy="130" r="4" fill="url(#slideGradient)" filter="url(#glow)"/>
  
  <!-- Circuit connections - thicker -->
  <path d="M64 70L88 100" stroke="url(#slideGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M64 130L88 112" stroke="url(#slideGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M112 100L136 70" stroke="url(#slideGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M112 112L136 130" stroke="url(#slideGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Additional neural connections for complexity -->
  <path d="M64 70L100 50" stroke="url(#slideGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M136 70L100 50" stroke="url(#slideGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M64 130L100 150" stroke="url(#slideGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M136 130L100 150" stroke="url(#slideGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- MindForge text -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#slideGradient)">
    MindForge
  </text>
</svg>
